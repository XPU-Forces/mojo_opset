name: Claude PR Review
on:
  pull_request:
    branches:
    - master
    - feat/*
    - dev/*
    - release/*
    types: [ opened, synchronize, reopened ]
    paths-ignore:
    - 'CHANGELOG.md'
    - 'README.md'
    - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  MOJO_OPSET_PROXY: ${{ secrets.MOJO_OPSET_PROXY }}

jobs:
  review:
    name: Claude review
    runs-on: NPU
    steps:
      - name: Pre-cleanup workspace
        run: |
          docker run --rm --user 0:0 --entrypoint bash \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            hub.byted.org/aicompiler/npu.ci.debian12:cann8.2.rc1_py3.11_th27 \
            -c 'shopt -s dotglob nullglob; rm -rf /workspace/*; ls -la /workspace'

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
          OUTBOUND_PROXY: ${{ env.MOJO_OPSET_PROXY }}
        run: |
          docker run --rm --user 0:0 --entrypoint bash \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e GITHUB_TOKEN \
            -e ANTHROPIC_AUTH_TOKEN \
            -e PR_NUMBER \
            -e BASE_SHA \
            -e HEAD_SHA \
            -e REPO \
            -e OUTBOUND_PROXY \
            hub.byted.org/aicompiler/npu.ci.debian12:cann8.2.rc1_py3.11_th27 \
            -c '
              set -euo pipefail
              git config --global --add safe.directory /workspace
              python3 /workspace/.github/scripts/claude_review.py
            '
